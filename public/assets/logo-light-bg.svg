<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 100" width="550" height="100">
    <defs>
        <style>
            .brand-name {
                font-family: 'Montserrat', 'Helvetica Neue', sans-serif;
                font-weight: 800;
                fill: #1A365D;
                font-size: 32px;
                letter-spacing: 2px;
            }
            .brand-sub {
                font-family: 'Inter', 'Helvetica Neue', sans-serif;
                font-weight: 700;
                fill: #319795;
                font-size: 9.5px;
                letter-spacing: 5px;
            }
            .symbol-text {
                font-family: 'Montserrat', sans-serif;
                font-weight: 800;
                font-size: 13px;
                fill: #FFFFFF;
            }
            .oxygen-text {
                font-family: 'Montserrat', sans-serif;
                font-weight: 800;
                font-size: 9px;
                fill: #319795;
            }
        </style>
        <linearGradient id="shieldBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FAFBFD" />
            <stop offset="100%" stop-color="#EBF8FF" />
        </linearGradient>
        <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#319795" />
            <stop offset="100%" stop-color="#2C7A7B" />
        </linearGradient>
        <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1A365D" flood-opacity="0.1" />
        </filter>
    </defs>
    <g transform="translate(10, 0)">
        <path d="M50,15 C65,15 78,21 80,32 C80,52 68,69 50,80 C32,69 20,52 20,32 C22,21 35,15 50,15 Z" fill="url(#shieldBg)" stroke="#1A365D" stroke-width="2.5" filter="url(#dropShadow)" />
        <path d="M30,35 Q50,22 70,35 T50,75 Z" fill="none" stroke="#8FA0B5" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.7"/>
        <path d="M26,45 C26,45 42,65 50,65 C62,65 74,45 74,45" fill="none" stroke="#319795" stroke-width="1.5" opacity="0.6"/>
        <circle cx="50" cy="48" r="14" fill="#1A365D" filter="url(#dropShadow)" />
        <text x="50" y="52.5" text-anchor="middle" class="symbol-text">Ag</text>
        <circle cx="73" cy="32" r="7.5" fill="url(#tealGrad)" stroke="#FFFFFF" stroke-width="1.5" filter="url(#dropShadow)" />
        <text x="83" y="31" class="oxygen-text">O<tspan dy="3" font-size="6.5">₂</tspan></text>
        <circle cx="28" cy="58" r="5" fill="#8FA0B5" stroke="#FFFFFF" stroke-width="1" />
        <line x1="33" y1="58" x2="40" y2="54" stroke="#8FA0B5" stroke-width="1" opacity="0.8"/>
        <line x1="61" y1="42" x2="67" y2="36" stroke="#319795" stroke-width="1" opacity="0.8"/>
    </g>
    <line x1="112" y1="22" x2="112" y2="78" stroke="#8FA0B5" stroke-width="1.5" stroke-linecap="round" opacity="0.4" />
    <g transform="translate(127, 0)">
        <text x="0" y="47" class="brand-name">PAMİR KİMYA</text>
        <text x="1" y="73" class="brand-sub">BİYOGÜVENLİK VE TEKNOLOJİ ÇÖZÜMLERİ</text>
    </g>
</svg>
