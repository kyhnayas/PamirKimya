<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 100" width="550" height="100">
    <defs>
        <style>
            .f-brand-name { 
                font-family: 'Montserrat', sans-serif; 
                font-weight: 800; 
                fill: #FFFFFF; 
                font-size: 32px; 
                letter-spacing: 2px; 
            }
            .f-brand-sub { 
                font-family: 'Inter', sans-serif; 
                font-weight: 700; 
                fill: #319795; 
                font-size: 9.5px; 
                letter-spacing: 5px; 
            }
            .symbol-text {
                font-family: 'Montserrat', sans-serif;
                font-weight: 800;
                font-size: 13px;
                fill: #FFFFFF;
            }
            .oxygen-text {
                font-family: 'Montserrat', sans-serif;
                font-weight: 800;
                font-size: 9px;
                fill: #319795;
            }
        </style>
        <linearGradient id="shieldBgDark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FAFBFD" />
            <stop offset="100%" stop-color="#EBF8FF" />
        </linearGradient>
    </defs>
    <g transform="translate(10, 0)">
        <path d="M50,15 C65,15 78,21 80,32 C80,52 68,69 50,80 C32,69 20,52 20,32 C22,21 35,15 50,15 Z" fill="url(#shieldBgDark)" stroke="#319795" stroke-width="2.5" />
        <circle cx="50" cy="48" r="14" fill="#319795" />
        <text x="50" y="52.5" text-anchor="middle" class="symbol-text">Ag</text>
        <circle cx="73" cy="32" r="7.5" fill="#FFFFFF" stroke="#319795" stroke-width="1.5" />
        <text x="83" y="31" class="oxygen-text">O<tspan dy="3" font-size="6.5">₂</tspan></text>
    </g>
    <line x1="112" y1="22" x2="112" y2="78" stroke="#319795" stroke-width="1.5" opacity="0.6" />
    <g transform="translate(127, 0)">
        <text x="0" y="47" class="f-brand-name">PAMİR KİMYA</text>
        <text x="1" y="73" class="f-brand-sub">BİYOGÜVENLİK VE TEKNOLOJİ ÇÖZÜMLERİ</text>
    </g>
